<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="text-xl font-bold">Your Name</div>
                <div class="space-x-4">
                    <a href="#projects" class="text-gray-600 hover:text-blue-600">Projects</a>
                    <!-- Add more navigation links as needed -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-h-screen">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <h1 class="text-4xl font-bold mb-8">Welcome to My Portfolio</h1>
            
            <!-- Project Filter -->
            <div class="max-w-6xl mx-auto px-4 mb-8">
                <div class="flex flex-wrap justify-center gap-2" id="project-filters">
                    <button class="filter-btn active px-4 py-2 rounded-full bg-blue-600 text-white" data-filter="all">All Projects</button>
                    <button class="filter-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300" data-filter="security">Security</button>
                    <button class="filter-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300" data-filter="aws">AWS</button>
                    <button class="filter-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300" data-filter="automation">Automation</button>
                    <button class="filter-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300" data-filter="python">Python</button>
                </div>
            </div>

            <!-- Projects Section -->
            <section id="projects" class="py-12">
                <h2 class="text-3xl font-bold text-center mb-12">My Projects</h2>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- AWS Automated Access Review -->
                    <div class="project-card bg-white rounded-lg overflow-hidden shadow-md" data-tags="python aws security automation">
                        <div class="h-48 bg-blue-100 flex items-center justify-center">
                            <i class="fas fa-robot text-5xl text-blue-600"></i>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold mb-2">AWS Automated Access Review</h3>
                            <p class="text-gray-600 mb-4">Automated IAM access review system for compliance and security.</p>
                            <div class="flex flex-wrap gap-2 mb-4">
                                <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">Python</span>
                                <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">AWS IAM</span>
                                <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">Automation</span>
                            </div>
                            <a href="https://github.com/yourusername/aws-automated-access-review" target="_blank" class="text-blue-600 hover:underline">View on GitHub</a>
                        </div>
                    </div>

                    <!-- Add more project cards here -->
                </div>
            </section>
        </div>
    </main>

    <script src="js/projects.js"></script>
</body>
</html>
